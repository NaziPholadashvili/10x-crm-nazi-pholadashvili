<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>10X CRM - Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="header">

        <h1>
            <a href="dashboard.html" class="logo">
                10X CRM
            </a>
        </h1>

        <nav aria-label="Main navigation">
            <ul>
                <li>
                    <a href="dashboard.html" class="active">
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="clients.html">
                        Clients
                    </a>
                </li>

                <li>
                    <a href="profile.html">
                        Profile
                    </a>
                </li>
            </ul>
        </nav>

        <button type="button" id="theme-toggle">
            Change Theme
        </button>

        <button type="button" id="logout-button">
            Logout
        </button>

    </header>

    <main class="dashboard-page">

        <section class="welcome-section">

            <div>
                <h2 id="welcome-message">
                    Welcome back!
                </h2>

                <p>
                    Here's what's happening in your CRM today.
                </p>
            </div>

            <div id="live-clock">
                --/--/---- --:--:--
            </div>

        </section>

        <section class="stats-section" aria-label="CRM statistics">

            <article class="stat-card">
                <h3>Total Clients</h3>
                <p id="total-clients">0</p>
            </article>

            <article class="stat-card">
                <h3>Active Deals</h3>
                <p id="active-deals">0</p>
            </article>

            <article class="stat-card">
                <h3>Won Revenue</h3>
                <p id="won-revenue">$0</p>
            </article>

            <article class="stat-card">
                <h3>New This Week</h3>
                <p id="new-this-week">0</p>
            </article>

        </section>

        <section class="pipeline-overview">

            <h2>Pipeline Overview</h2>

            <div class="pipeline-list">

                <article class="pipeline-item">
                    <h3>Lead</h3>
                    <p id="pipeline-lead">0</p>
                </article>

                <article class="pipeline-item">
                    <h3>Contacted</h3>
                    <p id="pipeline-contacted">0</p>
                </article>

                <article class="pipeline-item">
                    <h3>Won</h3>
                    <p id="pipeline-won">0</p>
                </article>

                <article class="pipeline-item">
                    <h3>Lost</h3>
                    <p id="pipeline-lost">0</p>
                </article>

            </div>

        </section>

        <section class="recent-clients">

            <h2>Recent Clients</h2>

            <div id="recent-clients-list"></div>

            <a href="clients.html" class="view-all-clients">
                View all clients →
            </a>

        </section>

    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="js/guard.js"></script>
    <script src="js/common.js"></script>
    <script src="js/data.js"></script>
    <script src="js/dashboard.js"></script>

</body>

</html>
