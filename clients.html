<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>10X CRM - Clients</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="header">
        <h1>10X CRM</h1>

        <nav>
            <ul>
                <li>
                    <a href="dashboard.html">Dashboard</a>
                </li>
                <li>
                    <a href="clients.html" class="active">Clients</a>
                </li>
                <li>
                    <a href="profile.html">Profile</a>
                </li>
            </ul>
        </nav>

        <button type="button" id="theme-toggle">
            Change Theme
        </button>

        <button type="button" id="logout-button">
            Logout
        </button>
    </header>

    <main class="clients-page">

        <section class="page-heading">
            <h2>Clients</h2>

            <button type="button" id="open-add-client-modal">
                + Add Client
            </button>
        </section>

        <section class="clients-toolbar">

            <input type="search" id="client-search" placeholder="Search by name or company">

            <div class="filter-buttons">
                <button type="button" class="filter-button active" data-status="All">
                    All
                </button>

                <button type="button" class="filter-button" data-status="Lead">
                    Lead
                </button>

                <button type="button" class="filter-button" data-status="Contacted">
                    Contacted
                </button>

                <button type="button" class="filter-button" data-status="Won">
                    Won
                </button>

                <button type="button" class="filter-button" data-status="Lost">
                    Lost
                </button>
            </div>

            <select id="client-sort">
                <option value="newest">Newest first</option>
                <option value="name">Name A-Z</option>
                <option value="deal-value">Deal value: high to low</option>
            </select>

        </section>

        <section id="clients-list">
            <p>Loading clients...</p>
        </section>

    </main>

    <script src="js/guard.js"></script>
    <script src="js/common.js"></script>
    <script src="js/data.js"></script>
    <script src="js/clients.js"></script>

</body>

</html>
