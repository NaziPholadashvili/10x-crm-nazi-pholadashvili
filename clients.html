<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Page Information -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>10X CRM - Clients</title>

    <!-- Global Styles -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Protected Page Header -->
    <header class="header">

        <h1>
            <a href="dashboard.html" class="logo">
                10X CRM
            </a>
        </h1>

        <!-- Main Navigation -->
        <nav aria-label="Main navigation">

            <ul>

                <li>
                    <a href="dashboard.html">
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="clients.html" class="active">
                        Clients
                    </a>
                </li>

                <li>
                    <a href="profile.html">
                        Profile
                    </a>
                </li>

            </ul>

        </nav>

        <button type="button" id="theme-toggle">
            Change Theme
        </button>

        <button type="button" id="logout-button">
            Logout
        </button>

    </header>

    <!-- Clients Page -->
    <main class="clients-page">

        <!-- Page Heading -->
        <section class="page-heading">

            <h2>Clients</h2>

            <button type="button" id="open-add-client-modal">
                + Add Client
            </button>

        </section>

        <!-- Clients Toolbar -->
        <section class="clients-toolbar">

            <input type="search" id="client-search" placeholder="Search by name, company or email"
                aria-label="Search clients">

            <div class="filter-buttons">

                <button type="button" class="filter-button active" data-status="All">
                    All
                </button>

                <button type="button" class="filter-button" data-status="Lead">
                    Lead
                </button>

                <button type="button" class="filter-button" data-status="Contacted">
                    Contacted
                </button>

                <button type="button" class="filter-button" data-status="Won">
                    Won
                </button>

                <button type="button" class="filter-button" data-status="Lost">
                    Lost
                </button>

            </div>

            <select id="client-sort" aria-label="Sort clients">

                <option value="newest">
                    Newest first
                </option>

                <option value="oldest">
                    Oldest first
                </option>

                <option value="name-az">
                    Name A-Z
                </option>

                <option value="name-za">
                    Name Z-A
                </option>

                <option value="deal-high">
                    Deal value: high to low
                </option>

                <option value="deal-low">
                    Deal value: low to high
                </option>

            </select>

        </section>

        <!-- Clients List -->
        <section id="clients-list" aria-live="polite">

            <p>Loading clients...</p>

        </section>

    </main>

    <!-- Add Client Modal -->
    <div class="modal hidden" id="add-client-modal" role="dialog" aria-modal="true" aria-labelledby="add-client-title">

        <div class="modal-content">

            <button type="button" class="close-modal-button" id="close-add-client-modal" aria-label="Close modal">
                ×
            </button>

            <h2 id="add-client-title">
                Add Client
            </h2>

            <!-- Add Client Form -->
            <form id="client-form" novalidate>

                <div class="form-group">

                    <label for="client-name">
                        Name
                    </label>

                    <input type="text" id="client-name" name="name" placeholder="Enter client name">

                    <p class="field-error" id="client-name-error"></p>

                </div>

                <div class="form-group">

                    <label for="client-email">
                        Email
                    </label>

                    <input type="email" id="client-email" name="email" placeholder="Enter client email">

                    <p class="field-error" id="client-email-error"></p>

                </div>

                <div class="form-group">

                    <label for="client-phone">
                        Phone
                    </label>

                    <input type="tel" id="client-phone" name="phone" placeholder="Enter phone number">

                    <p class="field-error" id="client-phone-error"></p>

                </div>

                <div class="form-group">

                    <label for="client-company">
                        Company
                    </label>

                    <input type="text" id="client-company" name="company" placeholder="Enter company name">

                </div>

                <div class="form-group">

                    <label for="client-deal-value">
                        Deal Value
                    </label>

                    <input type="number" id="client-deal-value" name="dealValue" placeholder="Enter deal value" min="1"
                        step="1">

                    <p class="field-error" id="client-deal-value-error"></p>

                </div>

                <div class="form-group">

                    <label for="client-status">
                        Status
                    </label>

                    <select id="client-status" name="status">

                        <option value="Lead">
                            Lead
                        </option>

                        <option value="Contacted">
                            Contacted
                        </option>

                        <option value="Won">
                            Won
                        </option>

                        <option value="Lost">
                            Lost
                        </option>

                    </select>

                </div>

                <button type="submit">
                    Add Client
                </button>

            </form>

        </div>

    </div>

    <!-- Client Details Modal -->
    <div class="modal hidden" id="client-details-modal" role="dialog" aria-modal="true"
        aria-labelledby="client-details-title">

        <div class="modal-content client-details-content">

            <button type="button" class="close-modal-button" id="close-client-details-modal" aria-label="Close modal">
                ×
            </button>

            <!-- Client Details -->
            <section class="client-details-header">

                <img id="details-client-image" alt="Client avatar">

                <div>

                    <h2 id="client-details-title">
                        Client Name
                    </h2>

                    <p id="details-client-company">
                        Company
                    </p>

                </div>

            </section>

            <section class="client-details-information">

                <p>
                    <strong>Email:</strong>
                    <span id="details-client-email"></span>
                </p>

                <p>
                    <strong>Phone:</strong>
                    <span id="details-client-phone"></span>
                </p>

                <p>
                    <strong>Status:</strong>
                    <span id="details-client-status"></span>
                </p>

                <p>
                    <strong>Deal Value:</strong>
                    <span id="details-client-deal-value"></span>
                </p>

                <p>
                    <strong>Client since:</strong>
                    <span id="details-client-created-at"></span>
                </p>

            </section>

            <!-- Client Notes -->
            <section class="client-notes-section">

                <h3>Notes</h3>

                <div id="client-notes-list"></div>

                <div class="form-group">

                    <label for="client-note">
                        Add Note
                    </label>

                    <textarea id="client-note" name="note" placeholder="Write a note" rows="4"></textarea>

                </div>

                <button type="button" id="add-note-button">
                    Add Note
                </button>

            </section>

            <button type="button" id="reminder-button">
                Remind me in 1 min
            </button>

        </div>

    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast" role="status" aria-live="polite">
    </div>


    <!-- JavaScript Files -->
    <script src="js/guard.js"></script>
    <script src="js/common.js"></script>
    <script src="js/data.js"></script>
    <script src="js/clients.js"></script>
</body>

</html>
