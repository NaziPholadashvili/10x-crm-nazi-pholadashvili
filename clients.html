<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>10X CRM - Clients</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="header">
        <h1>10X CRM</h1>

        <nav>
            <ul>
                <li>
                    <a href="dashboard.html">Dashboard</a>
                </li>

                <li>
                    <a href="clients.html" class="active">Clients</a>
                </li>

                <li>
                    <a href="profile.html">Profile</a>
                </li>
            </ul>
        </nav>

        <button type="button" id="theme-toggle">
            Change Theme
        </button>

        <button type="button" id="logout-button">
            Logout
        </button>
    </header>

    <main class="clients-page">

        <section class="page-heading">
            <h2>Clients</h2>

            <button type="button" id="open-add-client-modal">
                + Add Client
            </button>
        </section>

        <section class="clients-toolbar">

            <input type="search" id="client-search" placeholder="Search by name or company">

            <div class="filter-buttons">

                <button type="button" class="filter-button active" data-status="All">
                    All
                </button>

                <button type="button" class="filter-button" data-status="Lead">
                    Lead
                </button>

                <button type="button" class="filter-button" data-status="Contacted">
                    Contacted
                </button>

                <button type="button" class="filter-button" data-status="Won">
                    Won
                </button>

                <button type="button" class="filter-button" data-status="Lost">
                    Lost
                </button>

            </div>

            <select id="client-sort">
                <option value="newest">Newest first</option>
                <option value="name">Name A-Z</option>
                <option value="deal-value">Deal value: high to low</option>
            </select>

        </section>

        <section id="clients-list">
            <p>Loading clients...</p>
        </section>

    </main>

    <div class="modal hidden" id="add-client-modal">

        <div class="modal-content">

            <button type="button" class="close-modal-button" id="close-add-client-modal" aria-label="Close modal">
                ×
            </button>

            <h2>Add Client</h2>

            <form id="client-form" novalidate>

                <div class="form-group">
                    <label for="client-name">Name</label>

                    <input type="text" id="client-name" name="name" placeholder="Enter client name">
                </div>

                <div class="form-group">
                    <label for="client-email">Email</label>

                    <input type="email" id="client-email" name="email" placeholder="Enter client email">
                </div>

                <div class="form-group">
                    <label for="client-phone">Phone</label>

                    <input type="tel" id="client-phone" name="phone" placeholder="Enter phone number">
                </div>

                <div class="form-group">
                    <label for="client-company">Company</label>

                    <input type="text" id="client-company" name="company" placeholder="Enter company name">
                </div>

                <div class="form-group">
                    <label for="client-deal-value">Deal Value</label>

                    <input type="number" id="client-deal-value" name="dealValue" placeholder="Enter deal value" min="0"
                        step="1">
                </div>

                <div class="form-group">
                    <label for="client-status">Status</label>

                    <select id="client-status" name="status">
                        <option value="Lead">Lead</option>
                        <option value="Contacted">Contacted</option>
                        <option value="Won">Won</option>
                        <option value="Lost">Lost</option>
                    </select>
                </div>

                <button type="submit">
                    Add Client
                </button>

            </form>

        </div>

    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="js/guard.js"></script>
    <script src="js/common.js"></script>
    <script src="js/data.js"></script>
    <script src="js/clients.js"></script>

</body>

</html>
