<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Page Information -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>10X CRM - Login</title>

    <!-- Global Styles -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Login Page -->
    <main class="auth-page">

        <section class="auth-card login-card">

            <h1>Welcome back</h1>

            <!-- Login Form -->
            <form id="login-form" novalidate>

                <div class="form-group">

                    <label for="login-email">
                        Email
                    </label>

                    <input type="email" id="login-email" name="email" placeholder="Enter your email"
                        autocomplete="email">

                    <p class="field-error" id="login-email-error"></p>

                </div>

                <div class="form-group">

                    <label for="login-password">
                        Password
                    </label>

                    <div class="password-wrapper">

                        <input type="password" id="login-password" name="password" placeholder="Enter your password"
                            autocomplete="current-password">

                        <button type="button" class="password-toggle" data-target="login-password"
                            aria-label="Show password">
                            👁
                        </button>

                    </div>

                    <p class="field-error" id="login-password-error"></p>

                </div>

                <p class="form-error" id="login-form-error"></p>

                <button type="submit">
                    Log In
                </button>

            </form>

            <!-- Sign Up Link -->
            <p class="auth-link">

                Don't have an account?

                <a href="signup.html">
                    Sign up
                </a>

            </p>

        </section>

    </main>

    <!-- Toast Notification -->
    <div class="toast" id="toast" role="status" aria-live="polite">
    </div>

    <!-- JavaScript Files -->
    <script src="js/guard.js"></script>
    <script src="js/common.js"></script>
    <script src="js/login.js"></script>

</body>

</html>
