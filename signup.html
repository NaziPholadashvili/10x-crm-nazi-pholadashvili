<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>10X CRM - Sign Up</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class="auth-page">

        <section class="auth-card signup-card">

            <h1>Create your account</h1>

            <form id="signup-form" novalidate>

                <div class="form-group">
                    <label for="full-name">Full Name</label>

                    <input type="text" id="full-name" name="fullName" placeholder="Enter your full name"
                        autocomplete="name">

                    <p class="field-error" id="full-name-error"></p>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>

                    <input type="text" id="email" name="email" placeholder="Enter your email" autocomplete="email">

                    <p class="field-error" id="email-error"></p>
                </div>

                <div class="form-group">
                    <label for="company">Company</label>

                    <input type="text" id="company" name="company" placeholder="Company (optional)"
                        autocomplete="organization">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>

                    <input type="password" id="password" name="password" placeholder="Enter your password"
                        autocomplete="new-password">

                    <p class="field-error" id="password-error"></p>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>

                    <input type="password" id="confirm-password" name="confirmPassword"
                        placeholder="Confirm your password" autocomplete="new-password">

                    <p class="field-error" id="confirm-password-error"></p>
                </div>

                <button type="submit">
                    Create Account
                </button>

            </form>

            <p class="auth-link">
                Already have an account?
                <a href="index.html">Log in</a>
            </p>

        </section>

    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="js/guard.js"></script>
    <script src="js/common.js"></script>
    <script src="js/signup.js"></script>

</body>

</html>
