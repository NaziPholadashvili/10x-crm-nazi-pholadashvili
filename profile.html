<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>10X CRM - Profile</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="header">

        <h1>
            <a href="dashboard.html" class="logo">
                10X CRM
            </a>
        </h1>

        <nav aria-label="Main navigation">

            <ul>

                <li>
                    <a href="dashboard.html">
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="clients.html">
                        Clients
                    </a>
                </li>

                <li>
                    <a href="profile.html" class="active">
                        Profile
                    </a>
                </li>

            </ul>

        </nav>

        <button type="button" id="theme-toggle">
            Change Theme
        </button>

        <button type="button" id="logout-button">
            Logout
        </button>

    </header>

    <main class="profile-page">

        <section class="profile-information">

            <div class="profile-avatar" id="profile-avatar">
                --
            </div>

            <div class="profile-details">

                <h2 id="profile-name">
                    User Name
                </h2>

                <p id="profile-email">
                    nazi@example.com
                </p>

                <p id="profile-company">
                    No company
                </p>

                <p>
                    Member since
                    <span id="member-since">
                        --
                    </span>
                </p>

            </div>

        </section>

        <section class="profile-section">

            <h2>Edit Profile</h2>

            <form id="profile-form" novalidate>

                <div class="form-group">

                    <label for="profile-full-name">
                        Full Name
                    </label>

                    <input type="text" id="profile-full-name" name="fullName" autocomplete="name">

                    <p class="field-error" id="profile-full-name-error"></p>

                </div>

                <div class="form-group">

                    <label for="profile-company-input">
                        Company
                    </label>

                    <input type="text" id="profile-company-input" name="company" placeholder="Company (optional)"
                        autocomplete="organization">

                </div>

                <button type="submit">
                    Save Changes
                </button>

            </form>

        </section>

        <section class="profile-section">

            <h2>Change Password</h2>

            <form id="password-form" novalidate>

                <div class="form-group">

                    <label for="current-password">
                        Current Password
                    </label>

                    <input type="password" id="current-password" name="currentPassword" autocomplete="current-password">

                    <p class="field-error" id="current-password-error"></p>

                </div>

                <div class="form-group">

                    <label for="new-password">
                        New Password
                    </label>

                    <input type="password" id="new-password" name="newPassword" autocomplete="new-password">

                    <p class="field-error" id="new-password-error"></p>

                </div>

                <div class="form-group">

                    <label for="confirm-new-password">
                        Confirm New Password
                    </label>

                    <input type="password" id="confirm-new-password" name="confirmNewPassword"
                        autocomplete="new-password">

                    <p class="field-error" id="confirm-new-password-error"></p>

                </div>

                <button type="submit">
                    Change Password
                </button>

            </form>

        </section>

        <section class="profile-section danger-zone">

            <h2>Data Management</h2>

            <p>
                Reset all CRM client data and load the original clients again.
                Your account and current session will not be deleted.
            </p>

            <button type="button" id="reset-crm-data">
                Reset CRM Data
            </button>

        </section>

    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="js/guard.js"></script>
    <script src="js/common.js"></script>
    <script src="js/data.js"></script>
    <script src="js/profile.js"></script>

</body>

</html>
